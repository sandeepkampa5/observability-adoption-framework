# =============================================================================
# Enterprise Observability Adoption Framework - Local Development
#
# Quick-start: cp .env.example .env && docker-compose up -d
# =============================================================================
version: "3.9"

services:
  # --- OTel Collector Gateway ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: otel-gateway
    command: ["--config=/etc/otel/gateway-base.yaml"]
    volumes:
      - ../../otel-configs/pipelines/gateway-base.yaml:/etc/otel/gateway-base.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "14250:14250" # Jaeger gRPC
      - "9411:9411"   # Zipkin
      - "8888:8888"   # Prometheus self-metrics
      - "13133:13133" # Health check
    environment:
      - ENVIRONMENT=development
      - SERVICE_NAMESPACE=local
      - AWS_REGION=local
      - ADOPTION_PHASE=4
      - OTEL_BACKEND_ENDPOINT=${OTEL_BACKEND_ENDPOINT:-localhost:4317}
      - OTEL_BACKEND_TOKEN=${OTEL_BACKEND_TOKEN:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # --- Jaeger (Local trace backend for development) ---
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "14269:14269" # Admin port
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  # --- Prometheus (Local metrics backend for development) ---
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  # --- Grafana (Local dashboards) ---
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    restart: unless-stopped

  # --- Demo App (Generates sample telemetry) ---
  demo-app:
    image: ghcr.io/open-telemetry/demo:latest
    container_name: demo-app
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=demo-service
    depends_on:
      otel-collector:
        condition: service_healthy
    restart: unless-stopped
