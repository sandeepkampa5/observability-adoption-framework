# =============================================================================
# Enterprise Observability Adoption Framework - Kubernetes Deployment
#
# Deploy the OTel Collector Gateway as a Kubernetes Deployment with
# a ClusterIP Service for internal telemetry ingestion.
#
# Usage:
#   kubectl apply -f namespace.yaml
#   kubectl apply -f otel-collector-gateway.yaml
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    framework: observability-adoption-framework
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  gateway-base.yaml: |
    # Paste or mount your gateway-base.yaml config here
    # See: otel-configs/pipelines/gateway-base.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector-gateway
  namespace: observability
  labels:
    app: otel-collector
    component: gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: otel-collector
      component: gateway
  template:
    metadata:
      labels:
        app: otel-collector
        component: gateway
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.100.0
          args: ["--config=/etc/otel/gateway-base.yaml"]
          ports:
            - containerPort: 4317  # OTLP gRPC
              name: otlp-grpc
            - containerPort: 4318  # OTLP HTTP
              name: otlp-http
            - containerPort: 14250 # Jaeger
              name: jaeger-grpc
            - containerPort: 9411  # Zipkin
              name: zipkin
            - containerPort: 8888  # Self-metrics
              name: metrics
            - containerPort: 13133 # Health check
              name: health
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: SERVICE_NAMESPACE
              value: "platform"
            - name: ADOPTION_PHASE
              value: "4"
            - name: OTEL_BACKEND_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: otel-backend-secret
                  key: endpoint
            - name: OTEL_BACKEND_TOKEN
              valueFrom:
                secretKeyRef:
                  name: otel-backend-secret
                  key: token
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
spec:
  selector:
    app: otel-collector
    component: gateway
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: jaeger-grpc
      port: 14250
      targetPort: 14250
    - name: zipkin
      port: 9411
      targetPort: 9411
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: otel-collector-gateway
  namespace: observability
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: otel-collector-gateway
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
