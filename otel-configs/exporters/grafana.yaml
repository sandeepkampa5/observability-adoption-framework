# =============================================================================
# Exporter: Grafana Cloud (Tempo + Mimir + Loki)
#
# Sends traces to Tempo, metrics to Mimir, and logs to Loki.
#
# Required Environment Variables:
#   GRAFANA_CLOUD_INSTANCE_ID  - Grafana Cloud instance ID
#   GRAFANA_CLOUD_API_KEY      - Grafana Cloud API key
#   GRAFANA_TEMPO_ENDPOINT     - Tempo OTLP endpoint
#   GRAFANA_MIMIR_ENDPOINT     - Mimir remote write endpoint
#   GRAFANA_LOKI_ENDPOINT      - Loki endpoint
# =============================================================================

exporters:
  # --- Tempo (Traces via OTLP) ---
  otlp/tempo:
    endpoint: "${env:GRAFANA_TEMPO_ENDPOINT}"
    headers:
      "Authorization": "Basic ${env:GRAFANA_CLOUD_API_KEY}"
    tls:
      insecure: false

  # --- Mimir (Metrics via Prometheus Remote Write) ---
  prometheusremotewrite/mimir:
    endpoint: "${env:GRAFANA_MIMIR_ENDPOINT}"
    headers:
      "Authorization": "Basic ${env:GRAFANA_CLOUD_API_KEY}"
    resource_to_telemetry_conversion:
      enabled: true
    tls:
      insecure: false

  # --- Loki (Logs) ---
  loki:
    endpoint: "${env:GRAFANA_LOKI_ENDPOINT}"
    headers:
      "Authorization": "Basic ${env:GRAFANA_CLOUD_API_KEY}"
    labels:
      attributes:
        service.name: "service_name"
        service.namespace: "namespace"
        k8s.namespace.name: "k8s_namespace"
      resource:
        environment: "environment"

