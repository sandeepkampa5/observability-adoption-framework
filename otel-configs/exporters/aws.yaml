# =============================================================================
# Exporter: AWS CloudWatch + X-Ray
#
# Sends traces to AWS X-Ray, metrics to CloudWatch, and logs to CloudWatch Logs.
# Native AWS integration — no external API keys needed (uses IAM roles).
#
# Required Environment Variables:
#   AWS_REGION               - AWS region for telemetry export
#   CW_LOG_GROUP_NAME        - CloudWatch Logs group name
#   CW_METRICS_NAMESPACE     - CloudWatch custom metrics namespace
# =============================================================================

exporters:
  # --- AWS X-Ray (Traces) ---
  awsxray:
    region: "${env:AWS_REGION}"
    indexed_attributes:
      - "service.name"
      - "environment"
      - "http.method"
      - "http.status_code"

  # --- AWS CloudWatch Metrics ---
  awsemf:
    region: "${env:AWS_REGION}"
    namespace: "${env:CW_METRICS_NAMESPACE}"
    log_group_name: "/metrics/${env:CW_METRICS_NAMESPACE}"
    dimension_rollup_option: "NoDimensionRollup"
    resource_to_telemetry_conversion:
      enabled: true
    metric_declarations:
      - dimensions: [["service.name", "environment"]]
        metric_name_selectors:
          - "http.server.duration"
          - "http.server.request_count"
          - "rpc.server.duration"
      - dimensions: [["host.name"]]
        metric_name_selectors:
          - "system.cpu.utilization"
          - "system.memory.utilization"
          - "system.disk.io"

  # --- AWS CloudWatch Logs ---
  awscloudwatchlogs:
    region: "${env:AWS_REGION}"
    log_group_name: "${env:CW_LOG_GROUP_NAME}"
    log_stream_name: "otel-{service.name}-{host.name}"
    raw_log: false
    emf_only_mode: false

