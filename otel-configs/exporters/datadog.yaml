# =============================================================================
# Exporter: Datadog
#
# Sends traces, metrics, and logs to Datadog.
#
# Required Environment Variables:
#   DD_API_KEY   - Datadog API key
#   DD_SITE      - Datadog site (datadoghq.com, datadoghq.eu, etc.)
# =============================================================================

exporters:
  datadog:
    api:
      key: "${env:DD_API_KEY}"
      site: "${env:DD_SITE}"
    
    traces:
      span_name_as_resource_name: true
      trace_buffer: 500
    
    metrics:
      histograms:
        mode: distributions
        send_aggregation_metrics: true
      sums:
        cumulative_monotonic_mode: to_delta
      summaries:
        mode: gauges

    host_metadata:
      enabled: true
      hostname_source: first_resource

