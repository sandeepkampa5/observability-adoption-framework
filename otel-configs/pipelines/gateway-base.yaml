# =============================================================================
# Enterprise Observability Adoption Framework
# OpenTelemetry Collector Configuration: Gateway (Base)
#
# This is the core gateway configuration implementing the full-stack
# observability pattern: RUM → APM → Infrastructure
#
# Architecture Reference:
# - "Adoption of RUM and APM at Splunk" (March 2024)
# - "Adoption of Infrastructure Monitoring at Splunk" (July 2024)
# - Splunk-on-Splunk .conf2023 Full Observability Stack
#
# The gateway pattern provides:
# 1. Single ingestion point for all telemetry (traces, metrics, logs)
# 2. Intelligent routing and sampling
# 3. Backend-agnostic export (swap exporters, keep pipelines)
# 4. Phased adoption support (enable pipelines incrementally)
#
# Author: Sandeep Kampa
# =============================================================================

# =============================================================================
# RECEIVERS - Data Ingestion Layer
# =============================================================================
receivers:
  # --- OTLP (Primary receiver for all modern instrumentation) ---
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 16
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "*"  # Restrict in production
          allowed_headers:
            - "*"

  # --- Jaeger (Legacy trace format support) ---
  jaeger:
    protocols:
      grpc:
        endpoint: 0.0.0.0:14250
      thrift_http:
        endpoint: 0.0.0.0:14268

  # --- Zipkin (Legacy trace format support) ---
  zipkin:
    endpoint: 0.0.0.0:9411

  # --- Prometheus (Infrastructure metrics scraping) ---
  prometheus:
    config:
      scrape_configs:
        - job_name: "otel-collector-self"
          scrape_interval: 30s
          static_configs:
            - targets: ["localhost:8888"]

  # --- Host Metrics (Phase 1: Infrastructure Foundation) ---
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      disk:
      filesystem:
      load:
      network:
      processes:

  # --- Docker Stats (Container metrics) ---
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 30s
    timeout: 20s
    metrics:
      container.cpu.utilization:
        enabled: true
      container.memory.utilization:
        enabled: true

  # --- Filelog (Log collection) ---
  filelog:
    include:
      - /var/log/app/*.log
      - /var/log/containers/*.log
    operators:
      - type: json_parser
        timestamp:
          parse_from: attributes.time
          layout: "%Y-%m-%dT%H:%M:%S.%LZ"

# =============================================================================
# PROCESSORS - Data Processing & Enrichment Pipeline
# =============================================================================
processors:
  # --- Batch Processing (Performance optimization) ---
  batch:
    send_batch_size: 1024
    send_batch_max_size: 2048
    timeout: 5s

  # --- Memory Limiter (Backpressure protection) ---
  memory_limiter:
    check_interval: 5s
    limit_mib: 1536
    spike_limit_mib: 512

  # --- Resource Detection (Auto-enrich with environment context) ---
  resourcedetection:
    detectors:
      - env
      - system
      - docker
      - ec2
      - ecs
      - eks
    timeout: 5s
    override: false

  # --- Attributes (Standardize telemetry attributes) ---
  attributes:
    actions:
      - key: environment
        value: ${env:ENVIRONMENT}
        action: upsert
      - key: service.namespace
        value: ${env:SERVICE_NAMESPACE}
        action: upsert
      - key: deployment.region
        value: ${env:AWS_REGION}
        action: upsert

  # --- Resource (Add framework metadata) ---
  resource:
    attributes:
      - key: framework.name
        value: "observability-adoption-framework"
        action: upsert
      - key: framework.version
        value: "1.0.0"
        action: upsert
      - key: adoption.phase
        value: ${env:ADOPTION_PHASE}
        action: upsert

  # --- Filter (Noise reduction - key to Infrastructure Monitoring talk) ---
  filter/metrics:
    metrics:
      exclude:
        match_type: regexp
        metric_names:
          - "system\\.cpu\\.time"  # Raw time less useful than utilization
          - "process\\.runtime\\..*\\.gc\\..*"  # Verbose GC metrics

  # --- Tail Sampling (Intelligent trace sampling for APM) ---
  tail_sampling:
    decision_wait: 10s
    num_traces: 100000
    expected_new_traces_per_sec: 1000
    policies:
      # Always keep error traces
      - name: errors-policy
        type: status_code
        status_code:
          status_codes:
            - ERROR
      # Always keep slow traces (> 2s)
      - name: latency-policy
        type: latency
        latency:
          threshold_ms: 2000
      # Sample 10% of successful traces
      - name: probabilistic-policy
        type: probabilistic
        probabilistic:
          sampling_percentage: 10

  # --- Transform (Compute derived metrics) ---
  transform/metrics:
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["host.name"], resource.attributes["host.name"])

  # --- Kubernetes Attributes (K8s enrichment) ---
  k8sattributes:
    auth_type: "serviceAccount"
    passthrough: false
    extract:
      metadata:
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.deployment.name
        - k8s.namespace.name
        - k8s.node.name
        - k8s.container.name
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip

# =============================================================================
# EXPORTERS - Backend-Agnostic Output Layer
# 
# This is where the PLUGGABLE architecture shines. 
# Include the appropriate exporter file based on your backend.
# =============================================================================
exporters:
  # --- Debug (Development only) ---
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

  # --- OTLP Generic (Works with any OTLP-compatible backend) ---
  otlp/backend:
    endpoint: ${env:OTEL_BACKEND_ENDPOINT}
    headers:
      "X-SF-Token": "${env:OTEL_BACKEND_TOKEN}"
    tls:
      insecure: false
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000

  # --- Prometheus Remote Write (for metrics backends) ---
  prometheusremotewrite:
    endpoint: ${env:PROMETHEUS_REMOTE_WRITE_ENDPOINT}
    headers:
      "Authorization": "Bearer ${env:OTEL_BACKEND_TOKEN}"
    tls:
      insecure: false

# =============================================================================
# EXTENSIONS - Operational utilities
# =============================================================================
extensions:
  # Health check for load balancer / container orchestrator
  health_check:
    endpoint: 0.0.0.0:13133
    path: "/"
    
  # Performance profiling (disable in production)
  pprof:
    endpoint: 0.0.0.0:1777

  # zPages for debugging
  zpages:
    endpoint: 0.0.0.0:55679

# =============================================================================
# SERVICE - Pipeline Assembly
#
# Pipelines map the adoption maturity phases:
# - Phase 1: metrics/infrastructure (host & container metrics)
# - Phase 2: traces (APM distributed tracing)
# - Phase 3: metrics/rum + traces (full-stack with user experience)
# - Phase 4: All pipelines + alerting connectors
# =============================================================================
service:
  extensions:
    - health_check
    - pprof
    - zpages

  pipelines:
    # --- TRACES PIPELINE (Phase 2+: APM) ---
    traces:
      receivers:
        - otlp
        - jaeger
        - zipkin
      processors:
        - memory_limiter
        - resourcedetection
        - k8sattributes
        - attributes
        - resource
        - tail_sampling
        - batch
      exporters:
        - otlp/backend

    # --- METRICS PIPELINE (Phase 1+: Infrastructure) ---
    metrics:
      receivers:
        - otlp
        - prometheus
        - hostmetrics
        - docker_stats
      processors:
        - memory_limiter
        - resourcedetection
        - k8sattributes
        - attributes
        - resource
        - filter/metrics
        - transform/metrics
        - batch
      exporters:
        - otlp/backend

    # --- LOGS PIPELINE (Phase 1+: Supplementary) ---
    logs:
      receivers:
        - otlp
        - filelog
      processors:
        - memory_limiter
        - resourcedetection
        - k8sattributes
        - attributes
        - resource
        - batch
      exporters:
        - otlp/backend

  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
